<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Info</title>
  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 2rem;
      background: #f8f9fb;
      color: #212529;
    }
    main {
      max-width: 720px;
      margin: auto;
      padding: 1.5rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin-top: 0;
      color: #111;
    }
    dl {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 0.75rem 0.5rem;
    }
    dt {
      font-weight: 700;
      color: #333;
    }
    dd {
      margin: 0;
      color: #555;
    }
    a {
      color: #0069d9;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Information</h1>
    <p>This page provides details about the project and related contact information.</p>
    <section>
      <h2>Project</h2>
      <dl>
        <dt>Name</dt>
        <dd>Team Info Page</dd>
        <dt>Version</dt>
        <dd>1.0</dd>
        <dt>Description</dt>
        <dd>Simple informational page for the team.</dd>
      </dl>
    </section>
    <section>
      <h2>Contact</h2>
      <dl>
        <dt>Email</dt>
        <dd></dd>
        <dt>Website</dt>
        <dd><a href=""></a></dd>
      </dl>
    </section>
  </main>
</body>
</html>
